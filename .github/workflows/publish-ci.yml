  UploadRelease:
    needs: PublishApp
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Application Version
        id: getAppVersion
        uses: mavrosxristoforos/get-xml-info@2.0
        with:
          xml-file: 'BadMC_Launcher/BadMC_Launcher.csproj'
          xpath: '//ApplicationVersion'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Check Release
        id: CheckRelease
        run: |
          $branchPart = $env:GITHUB_REF.Split('/')[2]

          if ($branchPart -ne "Release") {
            echo "IsPreRelease=true" >> $env:GITHUB_OUTPUT
          }
          else {
            echo "IsPreRelease=false" >> $env:GITHUB_OUTPUT
          }

          echo "Branch=$branchPart" >> $env:GITHUB_OUTPUT

      - name: Generate Hashes Table
        continue-on-error: true
        id: MarkdownGetHashes
        run: |
          $markdownPath = "docs/Release.md"

          $folderPath = "artifacts"

          "`n`n## File Hash`n" | Add-Content -Path $markdownPath -Encoding UTF8
          "| File | SHA-256 Hash |" | Add-Content -Path $markdownPath -Encoding UTF8
          "|------|--------------|" | Add-Content -Path $markdownPath -Encoding UTF8

          Get-ChildItem -Path "$folderPath" -File -Depth 3 | ForEach-Object {
            $fileName = $_.Name

            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash

            "| $fileName | ``$hash`` |" | Add-Content -Path $markdownPath -Encoding UTF8
          }

      - name: Create Build Summary
        continue-on-error: true
        run: |
          $markdown = Get-Content -Path "docs/ActionSummary.md" -Raw

          "$markdown" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Read Markdown
        id: ReadMd
        uses: juliangruber/read-file-action@v1.1.7
        with:
          path: docs/Release.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.getAppVersion.outputs.info }}
          name: ${{ steps.CheckRelease.outputs.Branch}} Publish - ${{ steps.getAppVersion.outputs.info }}
          body: "${{ steps.ReadMd.outputs.content }}"
          draft: false
          prerelease: ${{ steps.CheckRelease.outputs.IsPreRelease}}
          files: |
            artifacts/**





